x-archiver-build: &archiver-build
  context: .
  args:
    PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}

services:
  nccn-archiver:
    build: *archiver-build
    env_file:
      - .env
    volumes:
      - ${ARCHIVE_HOST_DIR:-./archive}:/archive
    restart: "no"

  nccn-archiver-cron:
    build: *archiver-build
    env_file:
      - .env
    volumes:
      - ${ARCHIVE_HOST_DIR:-./archive}:/archive
    command: ["--daemon"]
    restart: unless-stopped
